name: Deploy para a VPS

# Deploy automático a cada push na main (e manualmente pela aba Actions).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Um deploy de cada vez; não cancela um deploy em andamento.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Porta de qualidade: só faz deploy se typecheck, testes e build do cliente passarem.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configurar chave SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Enviar código (rsync)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            --exclude node_modules --exclude .git --exclude .github \
            --exclude .claude --exclude 'client/dist' --exclude .env \
            --exclude 'server/data' --exclude 'supabase/.temp' \
            --exclude .npm --exclude .cache --exclude .config \
            ./ "$VPS_USER@$VPS_HOST:/opt/legendsclash/"

      - name: Provisionar (build + restart, idempotente)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" 'bash /opt/legendsclash/deploy/provision.sh'

      - name: Smoke test (health pelo proxy, HTTPS)
        run: |
          # primeira execução pós-Caddyfile com domínio: o Let's Encrypt pode
          # levar alguns segundos para emitir o certificado — daí os retries.
          curl -fsSL --retry 10 --retry-delay 5 --retry-connrefused --retry-all-errors \
            "https://srv1745709.hstgr.cloud/api/health" && echo "" && echo "deploy OK"
